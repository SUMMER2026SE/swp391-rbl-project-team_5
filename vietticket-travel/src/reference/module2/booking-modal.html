<script>
        /* =====================================================================
           TICKET QUANTITY & PRICE
        ===================================================================== */
        const ADULT_PRICE = 250000;
        const CHILD_PRICE = 150000;

        let counts = {
            adult: 1,
            child: 0
        };

        function increment(type) {
            counts[type]++;
            updateUI();
        }

        function decrement(type) {
            if (counts[type] > (type === 'adult' ? 1 : 0)) {
                counts[type]--;
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('adult-count').innerText = counts.adult;
            document.getElementById('child-count').innerText = counts.child;

            const total = (counts.adult * ADULT_PRICE) + (counts.child * CHILD_PRICE);
            document.getElementById('total-price').innerText = total.toLocaleString('vi-VN');
        }

        // Initialize ticket UI
        updateUI();

        /* =====================================================================
           FULL-MONTH CALENDAR PICKER
        ===================================================================== */

        // State — month is 0-indexed (5 = June)
        let currentMonth = 5;
        let currentYear  = 2026;
        let selectedDate = 4;   // day number currently selected

        const MONTH_NAMES_VI = [
            'Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4',
            'Tháng 5', 'Tháng 6', 'Tháng 7', 'Tháng 8',
            'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'
        ];

        /**
         * Returns a Date object for "today" normalised to midnight local time.
         */
        function today() {
            const d = new Date();
            d.setHours(0, 0, 0, 0);
            return d;
        }

        /**
         * Renders the calendar grid for currentMonth / currentYear.
         */
        function renderCalendar() {
            const grid  = document.getElementById('cal-grid');
            const label = document.getElementById('cal-month-label');
            const todayDate = today();

            // Update month/year label
            label.textContent = MONTH_NAMES_VI[currentMonth] + ', ' + currentYear;

            // Disable prev-month button when the displayed month is the current real month
            // (so users cannot navigate into the past)
            const realToday = new Date();
            const isPastMonth =
                currentYear < realToday.getFullYear() ||
                (currentYear === realToday.getFullYear() && currentMonth < realToday.getMonth());
            document.getElementById('cal-prev').disabled = isPastMonth;
            document.getElementById('cal-prev').style.opacity = isPastMonth ? '0.3' : '';
            document.getElementById('cal-prev').style.cursor  = isPastMonth ? 'not-allowed' : '';

            // Build the grid
            const firstDay   = new Date(currentYear, currentMonth, 1).getDay(); // 0=Sun
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            grid.innerHTML = '';

            // Leading filler cells (days from previous month)
            for (let i = 0; i < firstDay; i++) {
                const filler = document.createElement('div');
                filler.className = 'cal-day filler';
                grid.appendChild(filler);
            }

            // Actual day cells
            for (let d = 1; d <= daysInMonth; d++) {
                const cellDate = new Date(currentYear, currentMonth, d);
                cellDate.setHours(0, 0, 0, 0);

                const isPast     = cellDate < todayDate;
                const isToday    = cellDate.getTime() === todayDate.getTime();
                const isSelected =
                    d === selectedDate &&
                    currentMonth === (function () {
                        // track selected month/year separately if needed
                        return _selectedMonth;
                    }()) &&
                    currentYear === _selectedYear;

                const cell = document.createElement('div');
                cell.textContent = d;

                let classes = 'cal-day';

                if (isPast) {
                    classes += ' past';
                } else {
                    classes += ' available';
                    if (isToday)    classes += ' today';
                    if (isSelected) classes += ' selected';

                    cell.addEventListener('click', () => selectDate(d));
                }

                cell.className = classes;
                grid.appendChild(cell);
            }

            // Trailing filler cells to complete the last row (always keep 6 rows = 42 cells)
            const totalCells = 42;
            const filled = firstDay + daysInMonth;
            const trailing = totalCells - filled;
            for (let i = 0; i < trailing; i++) {
                const filler = document.createElement('div');
                filler.className = 'cal-day filler';
                grid.appendChild(filler);
            }
        }

        // Track which month/year the selection belongs to
        let _selectedMonth = currentMonth;
        let _selectedYear  = currentYear;

        /**
         * Called when a day cell is clicked.
         */
        function selectDate(day) {
            selectedDate   = day;
            _selectedMonth = currentMonth;
            _selectedYear  = currentYear;
            renderCalendar();
        }

        /**
         * Navigate forward or backward by `delta` months.
         * Prevents going before the current real month.
         */
        function changeMonth(delta) {
            let newMonth = currentMonth + delta;
            let newYear  = currentYear;

            if (newMonth > 11) { newMonth = 0;  newYear++; }
            if (newMonth < 0)  { newMonth = 11; newYear--; }

            // Do not allow navigation before today's month
            const realToday = new Date();
            const minYear   = realToday.getFullYear();
            const minMonth  = realToday.getMonth();
            if (newYear < minYear || (newYear === minYear && newMonth < minMonth)) {
                return;
            }

            currentMonth = newMonth;
            currentYear  = newYear;
            renderCalendar();
        }

        // Initial render
        renderCalendar();
    </script>
